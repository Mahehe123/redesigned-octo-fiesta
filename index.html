<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Mitsumori · Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif}

body{
  background:#FAF7F2;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  position:relative;overflow:hidden;
}

/* Subtle grain texture overlay */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.6;
}

/* Warm background blobs */
.blob{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
.blob-1{width:500px;height:500px;background:radial-gradient(circle,rgba(180,165,148,.18),transparent 70%);top:-100px;right:-100px}
.blob-2{width:400px;height:400px;background:radial-gradient(circle,rgba(210,195,175,.15),transparent 70%);bottom:-80px;left:-80px}

.card{
  position:relative;z-index:1;
  background:#fff;
  border:1px solid rgba(44,44,44,.09);
  border-radius:20px;
  padding:48px 44px 44px;
  width:100%;max-width:400px;
  box-shadow:0 8px 48px rgba(44,44,44,.08),0 1px 0 rgba(255,255,255,.9) inset;
  animation:fadeUp .5s ease both;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.brand{text-align:center;margin-bottom:36px}
.brand-eye{
  width:44px;height:44px;margin:0 auto 14px;
  border:1.5px solid rgba(44,44,44,.15);
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#2C2C2C,#4a4a4a);
}
.brand-eye svg{width:22px;height:22px;color:#F5F0E8}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:#2C2C2C;letter-spacing:.01em;line-height:1}
.brand-sub{font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:#8B8176;margin-top:5px}

.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(44,44,44,.1),transparent);margin-bottom:28px}

.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#6B6560;margin-bottom:7px}
.field input{
  width:100%;
  border:1px solid rgba(44,44,44,.15);
  border-radius:10px;
  padding:11px 14px;
  font-size:14px;font-family:'Inter',sans-serif;
  color:#2C2C2C;background:#FDFCFB;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.field input:focus{border-color:#8B8176;box-shadow:0 0 0 3px rgba(139,129,118,.12)}
.field input::placeholder{color:#C4BDB6}

.btn-signin{
  width:100%;margin-top:8px;
  background:linear-gradient(135deg,#2C2C2C,#1a1a1a);
  color:#F5F0E8;
  border:none;border-radius:10px;
  padding:13px;
  font-size:13px;font-weight:600;font-family:'Inter',sans-serif;
  letter-spacing:.03em;cursor:pointer;
  transition:opacity .2s,transform .15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-signin:hover{opacity:.88;transform:translateY(-1px)}
.btn-signin:active{transform:translateY(0)}
.btn-signin:disabled{opacity:.45;cursor:not-allowed;transform:none}

.err-box{
  display:none;margin-top:14px;padding:10px 14px;
  background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;
  font-size:12px;color:#DC2626;font-weight:500;
}
.err-box.on{display:block}

.footer-note{
  text-align:center;margin-top:20px;
  font-size:11px;color:#B0AAA4;line-height:1.6;
}

.ok-box{
  display:none;margin-top:14px;padding:10px 14px;
  background:#F0FDF4;border:1px solid #BBF7D0;border-radius:8px;
  font-size:12px;color:#15803D;font-weight:500;
}
.ok-box.on{display:block}

.forgot-wrap{text-align:center;margin-top:14px}
.btn-forgot{
  background:none;border:none;cursor:pointer;
  font-size:12px;font-weight:500;color:#8B8176;
  font-family:'Inter',sans-serif;
  text-decoration:underline;text-underline-offset:3px;
  transition:color .15s;
}
.btn-forgot:hover{color:#2C2C2C}

.forgot-panel{
  display:none;margin-top:16px;
  animation:fadeUp .3s ease both;
}
.forgot-panel.on{display:block}
.forgot-sep{height:1px;background:linear-gradient(90deg,transparent,rgba(44,44,44,.1),transparent);margin-bottom:18px}
.forgot-title{font-size:13px;font-weight:700;color:#2C2C2C;margin-bottom:4px}
.forgot-hint{font-size:11px;color:#8B8176;line-height:1.5;margin-bottom:14px}
.btn-reset{
  width:100%;
  background:linear-gradient(135deg,#8B8176,#6b6560);
  color:#F5F0E8;border:none;border-radius:10px;
  padding:11px;font-size:13px;font-weight:600;
  font-family:'Inter',sans-serif;letter-spacing:.03em;
  cursor:pointer;transition:opacity .2s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-reset:hover{opacity:.88}
.btn-reset:disabled{opacity:.45;cursor:not-allowed}
.forgot-err{
  display:none;margin-top:10px;padding:8px 12px;
  background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;
  font-size:11px;color:#DC2626;font-weight:500;
}
.forgot-err.on{display:block}

/* Loading spinner */
.spinner{
  width:16px;height:16px;border:2px solid rgba(245,240,232,.3);
  border-top-color:#F5F0E8;border-radius:50%;
  animation:spin .6s linear infinite;display:none;
}
.spinner.on{display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="card">
  <div class="brand">
    <div class="brand-eye">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
    </div>
    <div class="brand-name">Mitsumori</div>
    <div class="brand-sub">Quotation System</div>
  </div>

  <div class="divider"></div>

  <div class="field">
    <label>Username</label>
    <input id="inpUser" type="text" placeholder="your.name" autocomplete="username"
      onkeydown="if(event.key==='Enter')document.getElementById('inpPass').focus()"/>
  </div>
  <div class="field">
    <label>Password</label>
    <input id="inpPass" type="password" placeholder="••••••••" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')doLogin()"/>
  </div>

  <button class="btn-signin" id="btnLogin" onclick="doLogin()">
    <span class="spinner" id="spinner"></span>
    <span id="btnLabel">Sign In</span>
  </button>

  <div class="err-box" id="errBox"></div>
  <div class="ok-box" id="okBox"></div>

  <div class="forgot-wrap">
    <button class="btn-forgot" onclick="toggleForgot()">Forgot password?</button>
  </div>

  <!-- Forgot password inline panel -->
  <div class="forgot-panel" id="forgotPanel">
    <div class="forgot-sep"></div>
    <div class="forgot-title">Reset Password</div>
    <div class="forgot-hint">Enter your username and we'll send a reset link to your registered email address.</div>
    <div class="field" style="margin-bottom:12px">
      <label>Username</label>
      <input id="inpForgotUser" type="text" placeholder="your.name" autocomplete="off"
        onkeydown="if(event.key==='Enter')doForgot()"/>
    </div>
    <button class="btn-reset" id="btnReset" onclick="doForgot()">
      <span class="spinner" id="spinnerReset"></span>
      <span id="btnResetLabel">Send Reset Link</span>
    </button>
    <div class="forgot-err" id="forgotErr"></div>
  </div>

  <div class="footer-note">
    Access is restricted to authorised team members.<br/>
    Contact your administrator to request access.
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
let auth, db;

// ── Auth + Firebase refs (global) ─────────────────────────────────────────────

window.addEventListener('load', () => {
  firebase.initializeApp(FIREBASE_CONFIG);
  auth = firebase.auth();
  db   = firebase.firestore();

  // Auth state: redirect if already logged in
  auth.onAuthStateChanged(user => {
    if(user) window.location.href = 'dashboard.html';
  });
}); // end window.addEventListener('load')

// ── Login handler (global scope so onclick="" can reach it) ───────────────────
async function doLogin(){
  if(!auth){ showErr('App not ready yet. Please wait.'); return; }
  const raw  = document.getElementById('inpUser').value.trim().toLowerCase();
  const pass = document.getElementById('inpPass').value;
  const btn  = document.getElementById('btnLogin');
  const spin = document.getElementById('spinner');
  const lbl  = document.getElementById('btnLabel');

  document.getElementById('errBox').classList.remove('on');
  document.getElementById('okBox').classList.remove('on');
  if(!raw){ showErr('Please enter your username.'); return; }
  if(!pass){ showErr('Please enter your password.'); return; }

  // Username → email convention
  const email = raw.includes('@') ? raw : `${raw}@mitsumori.app`;

  btn.disabled = true;
  spin.classList.add('on');
  lbl.textContent = 'Signing in…';

  try {
    await auth.signInWithEmailAndPassword(email, pass);
    // onAuthStateChanged will handle redirect
  } catch(e) {
    const msg = (e.code === 'auth/wrong-password' || e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential')
      ? 'Incorrect username or password.'
      : e.code === 'auth/too-many-requests'
      ? 'Too many attempts. Please wait a moment and try again.'
      : 'Sign-in failed. Please try again.';
    showErr(msg);
    btn.disabled = false;
    spin.classList.remove('on');
    lbl.textContent = 'Sign In';
  }
}

// ── Error display ─────────────────────────────────────────────────────────────
function showErr(msg){
  const b = document.getElementById('errBox');
  b.textContent = msg;
  b.classList.add('on');
  document.getElementById('okBox').classList.remove('on');
}

// ── Success display ───────────────────────────────────────────────────────────
function showOk(msg){
  const b = document.getElementById('okBox');
  b.textContent = msg;
  b.classList.add('on');
  document.getElementById('errBox').classList.remove('on');
}

// ── Forgot password toggle ────────────────────────────────────────────────────
function toggleForgot(){
  const panel = document.getElementById('forgotPanel');
  panel.classList.toggle('on');
  if(panel.classList.contains('on')){
    document.getElementById('inpForgotUser').focus();
  }
  // Clear any previous forgot state
  document.getElementById('forgotErr').classList.remove('on');
}

// ── Send password reset ───────────────────────────────────────────────────────
async function doForgot(){
  if(!auth){ document.getElementById('forgotErr').textContent='App not ready yet.'; document.getElementById('forgotErr').classList.add('on'); return; }
  const raw = document.getElementById('inpForgotUser').value.trim().toLowerCase();
  const btn = document.getElementById('btnReset');
  const spin = document.getElementById('spinnerReset');
  const lbl = document.getElementById('btnResetLabel');
  const errEl = document.getElementById('forgotErr');
  errEl.classList.remove('on');

  if(!raw){ errEl.textContent='Please enter your username.'; errEl.classList.add('on'); return; }

  const email = raw.includes('@') ? raw : `${raw}@mitsumori.app`;

  btn.disabled = true; spin.classList.add('on'); lbl.textContent = 'Sending…';
  try {
    await auth.sendPasswordResetEmail(email);
    // On success — hide the panel, show a top-level ok message
    document.getElementById('forgotPanel').classList.remove('on');
    showOk('Reset link sent! Check the email registered to this account.');
  } catch(e) {
    const msg = (e.code === 'auth/user-not-found' || e.code === 'auth/invalid-email')
      ? 'No account found for that username.'
      : e.code === 'auth/too-many-requests'
      ? 'Too many attempts. Please wait before trying again.'
      : 'Could not send reset email. Try again.';
    errEl.textContent = msg; errEl.classList.add('on');
  } finally {
    btn.disabled = false; spin.classList.remove('on'); lbl.textContent = 'Send Reset Link';
  }
}
</script>
</body>
</html>
